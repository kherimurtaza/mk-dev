<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="969bce3770c185e4" />

    <!-- ══════════════════════════════════════════════
         PRIMARY SEO — Title & Description
         Google shows ~60 chars for title, ~160 for description
    ══════════════════════════════════════════════ -->
    <title>Murtaza Kheri | Full Stack Developer & Designer – Kuwait</title>
    <meta
      name="description"
      content="Murtaza Kheri – Full Stack Developer from Kuwait. Expert in MERN Stack, React, Node.js, Python & AI Automation. Building scalable web apps, SaaS platforms, POS systems & design services."
    />
    <meta
      name="keywords"
      content="Murtaza Kheri, Murtaza FullStack, Murtaza Kheri Developer, Murtaza Kheri Kuwait, Full Stack Developer Kuwait, MERN Stack Developer, React Developer Kuwait, Node.js Developer, Python Developer, AI Automation Kuwait, Web Developer Kuwait, SaaS Developer, Portfolio Murtaza, MurtazaKheri, Kheri Murtaza"
    />
    <meta name="author" content="Murtaza Kheri" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="theme-color" content="#0c0c14" />

    <!-- ══════════════════════════════════════════════
         CANONICAL URL — Prevents duplicate content penalty
    ══════════════════════════════════════════════ -->
    <link rel="canonical" href="https://kherimurtaza.github.io/graphic-designer/" />

    <!-- ══════════════════════════════════════════════
         OPEN GRAPH — Controls how link looks on Facebook, WhatsApp, LinkedIn
    ══════════════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Murtaza Kheri" />
    <meta property="og:title" content="Murtaza Kheri | Full Stack Developer & Designer – Kuwait" />
    <meta
      property="og:description"
      content="Murtaza Kheri – Full Stack Developer from Kuwait. MERN Stack, React, Node.js, Python & AI Automation. 50+ projects delivered, 30+ happy clients."
    />
    <meta property="og:image" content="https://kherimurtaza.github.io/graphic-designer/img/banner-img.jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Murtaza Kheri – Full Stack Developer Portfolio" />
    <meta property="og:url" content="https://kherimurtaza.github.io/graphic-designer/" />
    <meta property="og:locale" content="en_US" />

    <!-- ══════════════════════════════════════════════
         TWITTER CARD — Controls how link looks on Twitter/X
    ══════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Murtaza Kheri | Full Stack Developer – Kuwait" />
    <meta
      name="twitter:description"
      content="Full Stack Developer from Kuwait. MERN Stack, React, Node.js, Python & AI Automation. Building scalable web apps & SaaS platforms."
    />
    <meta name="twitter:image" content="https://kherimurtaza.github.io/graphic-designer/img/banner-img.jpeg" />
    <meta name="twitter:image:alt" content="Murtaza Kheri Portfolio" />

    <!-- ══════════════════════════════════════════════
         STRUCTURED DATA (JSON-LD)
         This is what Google uses for rich results in search.
         "Person" schema tells Google exactly who you are.
    ══════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Murtaza Kheri",
      "alternateName": ["Murtaza FullStack", "MurtazaKheri", "Kheri Murtaza"],
      "url": "https://kherimurtaza.github.io/graphic-designer/",
      "image": "https://kherimurtaza.github.io/graphic-designer/img/banner-img.jpeg",
      "sameAs": [
        "https://github.com/kherimurtaza",
        "https://linkedin.com/in/murtazakheri"
      ],
      "jobTitle": "Full Stack Developer",
      "description": "Full Stack Developer from Kuwait specializing in MERN Stack, React.js, Node.js, Python, AI Automation, SaaS platforms, POS systems, and graphic design.",
      "knowsAbout": [
        "React.js", "Node.js", "MongoDB", "Express.js",
        "Python", "Django", "TypeScript", "AWS",
        "AI Automation", "LangChain", "OpenAI API",
        "UI/UX Design", "Figma", "SaaS Development"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "KW",
        "addressLocality": "Kuwait"
      },
      "worksFor": {
        "@type": "Organization",
        "name": "Freelance"
      }
    }
    </script>

    <!-- ══════════════════════════════════════════════
         STRUCTURED DATA — WebSite schema
         Enables Google Sitelinks Search Box
    ══════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Murtaza Kheri Portfolio",
      "url": "https://kherimurtaza.github.io/graphic-designer/",
      "description": "Portfolio of Murtaza Kheri – Full Stack Developer & Designer from Kuwait",
      "author": {
        "@type": "Person",
        "name": "Murtaza Kheri"
      }
    }
    </script>

    <!-- ══════════════════════════════════════════════
         STRUCTURED DATA — Professional Service
         Helps rank for service-based searches
    ══════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Murtaza Kheri – Full Stack Development & Design",
      "url": "https://kherimurtaza.github.io/graphic-designer/",
      "image": "https://kherimurtaza.github.io/graphic-designer/img/banner-img.jpeg",
      "description": "Full Stack web development, AI automation, SaaS platforms, POS systems, UI/UX design, and graphic design services in Kuwait.",
      "priceRange": "30–600 KD",
      "areaServed": {
        "@type": "Country",
        "name": "Kuwait"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Development & Design Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Full Stack Web Development" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "MERN Stack Development" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "AI Automation & Python" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "SaaS Platform Development" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "UI/UX Design" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Logo & Brand Identity" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Graphic Design Kuwait" } }
        ]
      }
    }
    </script>

    <!-- ══════════════════════════════════════════════
         FAVICONS — All sizes for all devices
    ══════════════════════════════════════════════ -->
    <link rel="icon" href="/img/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/img/favicon.png" />

    <!-- ══════════════════════════════════════════════
         FONTS — Preconnect first for speed (Core Web Vitals)
    ══════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- ══════════════════════════════════════════════
         PERFORMANCE HINTS — Preload critical assets
    ══════════════════════════════════════════════ -->
    <link rel="preload" href="/img/banner-img.jpeg" as="image" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body class="font-sans bg-white text-slate-900">
    <!-- 
      IMPORTANT: This hidden text is crawled by Google bots.
      It reinforces your name and keywords without showing to users.
    -->
    <noscript>
      <div style="position:absolute;left:-9999px;top:-9999px;" aria-hidden="true">
        Murtaza Kheri – Full Stack Developer &amp; Designer from Kuwait.
        MERN Stack, React.js, Node.js, Python, AI Automation.
        Portfolio: kherimurtaza.github.io
      </div>
    </noscript>

    <div id="app"></div>
  </body>
</html>
